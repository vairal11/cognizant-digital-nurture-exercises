<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accordion</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <div class="accordion" id="faqAccordion">

            <div class="accordion-item">

                <h2 class="accordion-header">

                    <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#item1">

                        What is Bootstrap?

                    </button>

                </h2>

                <div id="item1" class="accordion-collapse collapse show" data-bs-parent="#faqAccordion">

                    <div class="accordion-body">
                        Bootstrap is a front-end CSS framework.
                    </div>

                </div>

            </div>

            <div class="accordion-item">

                <h2 class="accordion-header">

                    <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#item2">

                        Why use Bootstrap?

                    </button>

                </h2>

                <div id="item2" class="accordion-collapse collapse" data-bs-parent="#faqAccordion">

                    <div class="accordion-body">
                        It helps create responsive websites quickly.
                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
