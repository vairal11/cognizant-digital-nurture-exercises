<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Object Layout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <div class="d-flex align-items-start border p-3">

            <img src="https://picsum.photos/120" class="rounded" alt="Profile Image">

            <div class="ms-3">

                <h5>John Doe</h5>

                <p>This is a sample media object layout. The image is displayed
                    on the left and content appears on the right side.</p>

                <button class="btn btn-success">Read More</button>

            </div>

        </div>

    </div>
</body>

</html>
