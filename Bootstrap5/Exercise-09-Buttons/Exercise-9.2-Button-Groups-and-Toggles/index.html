<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Groups</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Button Group</h2>

    <div class="btn-group">

        <button class="btn btn-primary">
            Left
        </button>

        <button class="btn btn-primary">
            Middle
        </button>

        <button class="btn btn-primary">
            Right
        </button>

    </div>

    <hr>

    <h2 class="mb-3">Toggle Buttons</h2>

    <input type="checkbox" class="btn-check" id="check1">

    <label class="btn btn-outline-success" for="check1">
        Toggle Me
    </label>

</div>

</body>
</html>
