<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Section</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container py-5">
        <h2 class="text-center mb-5">Pricing Plans</h2>

        <div class="row">

            <div class="col-md-4">
                <div class="card p-3">
                    <h4>Basic</h4>
                    <p>₹499/month</p>
                    <button class="btn btn-success">Choose Plan</button>

                </div>

            </div>

            <div class="col-md-4">
                <div class="card p-3">
                    <h4>Standard</h4>
                    <p>₹999/month</p>
                    <button class="btn btn-success">Choose Plan</button>

                </div>

            </div>

            <div class="col-md-4">
                <div class="card p-3">
                    <h4>Premium</h4>
                    <p>₹1499/month</p>
                    <button class="btn btn-success">Choose Plan</button>

                </div>

            </div>
        </div>
    </div>
</body>

</html>
