<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Structure Files</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-5">
        <h1 class="text-primary">Bootstrap Structure Demo</h1>
        <p>Understanding CSS + JS + Plugins</p>

        <!-- Button triggers modal -->
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#demoModal">
            Open Modal
        </button>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="demoModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Bootstrap Modal</h5>
                </div>

                <div class="modal-body">
                    This modal works using bootstrap.bundle.min.js
                </div>

                <div class="modal-footer">
                    <button class="btn btn-danger" data-bs-dismiss="modal">Close</button>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS (IMPORTANT) -->
    <script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>
