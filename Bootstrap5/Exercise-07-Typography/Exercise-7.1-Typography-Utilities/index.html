<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typography Utilities</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="display-1">Display Heading</h1>

    <p class="lead">
        This is a lead paragraph used for highlighting important text.
    </p>

    <p class="text-muted">
        This text appears muted.
    </p>

    <p class="fw-bold">
        This text is bold.
    </p>

    <p class="fst-italic">
        This text is italic.
    </p>

</div>

</body>
</html>
