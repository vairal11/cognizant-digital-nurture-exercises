<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Colors</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h2 class="text-center mb-4">Dashboard</h2>

        <div class="row g-3">

            <div class="col-md-3">
                <div class="bg-primary text-white p-4 text-center rounded">
                    Users
                </div>
            </div>

            <div class="col-md-3">
                <div class="bg-success text-white p-4 text-center rounded">
                    Sales
                </div>
            </div>

            <div class="col-md-3">
                <div class="bg-warning text-dark p-4 text-center rounded">
                    Orders
                </div>
            </div>

            <div class="col-md-3">
                <div class="bg-danger text-white p-4 text-center rounded">
                    Revenue
                </div>
            </div>

        </div>
    </div>
</body>

</html>
