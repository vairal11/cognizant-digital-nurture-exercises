<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Footer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <h2>Bootstrap Fixed Footer</h2>
        <p>Scroll the page. The footer remains fixed at the bottom.</p>
    </div>

    <footer class="position-fixed bottom-0 start-0 w-100 bg-dark text-white text-center p-3">@2026 My Website</footer>
</body>

</html>
