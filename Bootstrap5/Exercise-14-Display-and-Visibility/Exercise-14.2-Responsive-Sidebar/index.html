<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Sidebar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container-fluid">
        <div class="row">

            <div class="col-md-3 bg-dark text-white p-4 d-none d-md-block">

                <h4>Sidebar</h4>

                <ul class="list-unstyled">
                    <li>Dashboard</li>
                    <li>Profile</li>
                    <li>Settings</li>
                    <li>Logout</li>

                </ul>

            </div>

            <div class="col-md-9 p-4">
                <h2>Main Content</h2>
                <p>This content is visible on all screen sizes.</p>
            </div>

        </div>

    </div>
</body>

</html>
