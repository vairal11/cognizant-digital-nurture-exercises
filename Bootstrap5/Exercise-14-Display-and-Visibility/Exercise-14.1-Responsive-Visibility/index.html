<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Visibility</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4">

        <h2 class="text-center mb-4">Display and Visisbility</h2>

        <!-- Hidden on all screens, visible from md and above -->
        <div class="d-none d-md-block bg-primary text-white p-3 mb-3">
            Visisble on Tablet and Desktop
        </div>

        <!-- Hidden until lg screen -->
        <div class="d-none d-lg-flex bg-success text-white p-3">
            Visisble only on Large Scrrens and Above
        </div>
    </div>
</body>

</html>
