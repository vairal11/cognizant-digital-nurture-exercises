<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Gallary</title>

    <style>
        .event-img{
            width: 180px;
            height: 120px;
            border: 3px solid #333;
        }

        table{
            width: 100%;
            text-align: center;
        }

        caption{
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

    </style>
</head>

<body>

    <table>
        <caption>Past Community Events Gallary</caption>

        <tr>
            <td>
                <img src="https://images.unsplash.com/photo-1501386761578-eac5c94b800a" 
                alt="Music Event" 
                title="Music Night" 
                class="event-img">
                <p>Music Night</p>
            </td>

            <td>
                <img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1"
                alt="Food Festival"
                title="Food Festival"
                class="event-img">
                <p>Food Festival</p>
            </td>

            <td>
                <img src="https://images.unsplash.com/photo-1521412644187-c49fa049e84d"
                alt="Sports Day"
                title="Sports Day"
                class="event-img">
                <p>Sports Day</p>
            </td>
        </tr>

        <tr>
            <td>
                <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
                alt="Cultural Event"
                title="Cultural Event"
                class="event-img">
                <p>Cultural Event</p>
            </td>

            <td>
                <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6"
                alt="Tree Plantation"
                title="Tree Plantation"
                class="event-img">
                <p>Tree Plantation</p>
            </td>

            <td>
                <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952"
                alt="Cleanliness Drive"
                title="Cleanliness Drive"
                class="event-img">
                <p>Cleanliness Drive</p>
            </td>
        </tr>


    </table>

</body>

</html>
