<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DevTools Debugging</title>

        <style>
            body{
                font-family: Arial;
                background-color: #f2f2f2;
            }

            .box{
                width: 300px;
                margin: 100px auto;
                padding: 20px;
                background: white;
                text-align: center;
                border-radius: 10px;
            }

            .title{
                color: blue;
            }

            
        </style>
        
    </head>

    <body>

        <div class="box">

            <h2 class="title">Debugging Practice</h2>

            <button onclick="testFunction()">Cleck to Debug</button>

            <p id="output"></p>

        </div>

        <script>

            function testFunction(){

                let a=10;
                let b=20;

                console.log("Function started");
                console.log("value of a: ",a);
                console.log("Value of b: ",b);

                let result=a+b;

                console.log("Result: ",result);

                document.getElementById("output").innerHTML="Result is: "+result;

                debugger; //breakpoint for DevTools
            }
        </script>
    </body>
</html>
