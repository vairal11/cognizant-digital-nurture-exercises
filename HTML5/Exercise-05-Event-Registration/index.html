<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration Form</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .form-container{
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input,select,textarea{
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button{
            background-color: blue;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        output{
            display: block;
            margin-top: 10px;
            font-weight: bold;
            color: green;

        }

    </style>
</head>

<body>

    <div class="form-container">
        <h2>Event Registration</h2>

        <form  onsubmit="showMessage(event)">

            <!--Name-->
            <input type="text"
            placeholder="Enter your name"
            autofocus
            required>

            <!--Email-->
            <input type="email"
            placeholder="Enter your email"
            required>

            <!--Date-->
            <input type="date"
            required>

            <!--Event Type-->
            <select required>
                <option value="">Select Event Type</option>
                <option>Music</option>
                <option>Sports</option>
                <option>Food Festival</option>
            </select>

            <textarea placeholder="Your messagd..." required></textarea>

            <button type="submit">Register</button>
        </form>

        <!--Output-->
        <output id="result"></output>

    </div>

    <script>
        function showMessage(event){
            event.preventDefault();
            document.getElementById("result").value="Registration successful! Thank you for joining the event."
        }
    </script>



</body>

</html>
