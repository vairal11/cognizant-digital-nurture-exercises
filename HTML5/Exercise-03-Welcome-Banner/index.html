<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>

    <!--Internal CSS-->
    <style>
        #welcomeBanner{
            background-color: blue;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .highlight{
            background-color: yellow;
            font-weight: bold;
        }


    </style>
</head>

<body>

    <!--Welcome Banner-->
    <div id="welcomeBanner">
        <h1>Welcome to the Community Event Portal</h1>

        <p>
            Special Offer:
            <span style="color: red; font-weight: bold;">Register today and get free event access!</span>
        </p>

    </div>

    <!--Highlight Class Example-->
    <p class="highlight">Upcoming events are available now.</p>

    <p>
    Visit the <span class="highlight">Events Section</span>for details.
    </p>

</body>

</html>
