<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale">
    <title>Exercise 03 - Selectors Playground</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!--ID Selector example-->
    <header id="mainHeader">
        <h1>Local Community Event Portal</h1>

    </header>

    <!--Element Selector example-->
    <h2>Upcoming Events</h2>

    <!--Class Selector example-->
    <div class="eventCard">
        <h3>Music Night</h3>
        <p>Enjoy live music with local artists.</p>

    </div>

    <div class="eventCard">
        <h3>Food Festival</h3>
        <p>Taste delicious dishes from around the city</p>
    </div>

</body>

</html>
