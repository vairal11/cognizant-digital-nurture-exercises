<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise-08-Box-Model-and-Layout-Control</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="header">
      <h1>Community Event Portal</h1>
    </header>

    <section>
      <div class="eventCard">
        <h2>Music Night</h2>
        <p>Enjoy live performance and entertainment.</p>
      </div>

      <div class="eventCard">
        <h2>Food Festival</h2>
        <p>Experience delicious dishes from different cultures.</p>
      </div>
    </section>

    <section class="form-section">
      <form>
        <input type="text" placeholder="Enter your name" />
        <input type="email" placeholder="Enter your email" />

        <button type="submit">Submit</button>
      </form>
    </section>

    <!--Visibility Example-->
    <div class="hidden-box">visibility:hidden example</div>

    <div class="none-box">display:none example</div>
  </body>
</html>
